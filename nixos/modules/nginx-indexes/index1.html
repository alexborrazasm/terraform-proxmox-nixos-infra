<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nixos-worker1</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f7f4;
      color: #2C2C2A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }
    header { text-align: center; }
    h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }
    .badge {
      display: inline-block;
      margin-top: 0.4rem;
      padding: 0.2rem 0.65rem;
      border-radius: 9999px;
      background: #E1F5EE;
      color: #085041;
      font-size: 0.7rem;
      font-weight: 500;
      border: 1px solid #1D9E75;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .diagram { width: 100%; max-width: 680px; }
  </style>
</head>
<body>
  <header>
    <h1>nixos-worker1</h1>
    <span class="badge">activo</span>
  </header>
  <div class="diagram">
    <svg width="100%" viewBox="0 0 680 530" role="img" xmlns="http://www.w3.org/2000/svg">
      <title>Load balancer: Caddy → Worker 1</title>
      <desc>Flujo activo: Internet entra por pfSense, pasa a Caddy y se dirige a Worker 1.</desc>
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

        </marker>
      </defs>

      <ellipse cx="60" cy="100" rx="44" ry="26" fill="none" stroke="#7F77DD" stroke-width="2" stroke-dasharray="4 3"></ellipse>
      <text font-family="sans-serif" font-size="12" x="60" y="105" text-anchor="middle" fill="#7F77DD">Internet</text>

      <ellipse cx="620" cy="100" rx="44" ry="26" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" opacity="0.2"></ellipse>
      <text font-family="sans-serif" font-size="12" x="620" y="105" text-anchor="middle" fill="#888780" opacity="0.2">LAN</text>

      <circle cx="340" cy="100" r="32" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2"></circle>
      <line x1="317" y1="77" x2="363" y2="123" stroke="#7F77DD" stroke-width="1.5"></line>
      <line x1="363" y1="77" x2="317" y2="123" stroke="#7F77DD" stroke-width="1.5"></line>
      <text font-family="sans-serif" font-size="13" font-weight="500" x="340" y="60" text-anchor="middle" fill="#2C2C2A">pfSense</text>

      <text font-family="sans-serif" font-size="11" x="294" y="82" text-anchor="middle" fill="#7F77DD">WAN</text>
      <text font-family="sans-serif" font-size="11" x="387" y="82" text-anchor="middle" fill="#888780" opacity="0.3">LAN</text>

      <line x1="372" y1="100" x2="576" y2="100" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.12"></line>
      <line x1="104" y1="100" x2="308" y2="100" stroke="#7F77DD" stroke-width="2.5" marker-end="url(#arrow)"></line>

      <text font-family="sans-serif" font-size="11" x="348" y="158" fill="#888780">DMZ · 10.60.60.x</text>
      <line x1="340" y1="132" x2="340" y2="470" stroke="#888780" stroke-width="1" opacity="0.12"></line>

      <line x1="336" y1="132" x2="336" y2="200" stroke="#7F77DD" stroke-width="2.5"></line>
      <line x1="336" y1="200" x2="270" y2="200" stroke="#7F77DD" stroke-width="2.5" marker-end="url(#arrow)"></line>

      <line x1="270" y1="206" x2="344" y2="206" stroke="#1D9E75" stroke-width="2.5"></line>
      <line x1="344" y1="206" x2="344" y2="302" stroke="#1D9E75" stroke-width="2.5"></line>
      <line x1="344" y1="302" x2="270" y2="302" stroke="#1D9E75" stroke-width="2.5" marker-end="url(#arrow)"></line>

      <rect x="140" y="180" width="130" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"></rect>
      <text font-family="sans-serif" font-size="13" font-weight="500" x="205" y="199" text-anchor="middle" fill="#3C3489">Caddy</text>
      <text font-family="sans-serif" font-size="11" x="205" y="215" text-anchor="middle" fill="#534AB7">.10 · VM</text>

      <rect x="140" y="280" width="130" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"></rect>
      <text font-family="sans-serif" font-size="13" font-weight="500" x="205" y="299" text-anchor="middle" fill="#085041">Worker 1</text>
      <text font-family="sans-serif" font-size="11" x="205" y="315" text-anchor="middle" fill="#0F6E56">.11 · VM</text>

      <rect x="140" y="354" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" opacity="0.2"></rect>
      <text font-family="sans-serif" font-size="13" font-weight="500" x="205" y="373" text-anchor="middle" fill="#888780" opacity="0.2">Worker 2</text>
      <text font-family="sans-serif" font-size="11" x="205" y="389" text-anchor="middle" fill="#888780" opacity="0.2">.12 · VM</text>

      <rect x="140" y="428" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" opacity="0.2"></rect>
      <text font-family="sans-serif" font-size="13" font-weight="500" x="205" y="447" text-anchor="middle" fill="#888780" opacity="0.2">Worker 3</text>
      <text font-family="sans-serif" font-size="11" x="205" y="463" text-anchor="middle" fill="#888780" opacity="0.2">.13 · VM</text>

      <rect x="420" y="180" width="210" height="76" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5"></rect>
      <line x1="438" y1="206" x2="468" y2="206" stroke="#7F77DD" stroke-width="2.5"></line>
      <text font-family="sans-serif" font-size="11" x="476" y="210" fill="#2C2C2A">Internet → Caddy</text>
      <line x1="438" y1="232" x2="468" y2="232" stroke="#1D9E75" stroke-width="2.5"></line>
      <text font-family="sans-serif" font-size="11" x="476" y="236" fill="#2C2C2A">Caddy → Worker 1</text>
    </svg>
  </div>
</body>
</html>
