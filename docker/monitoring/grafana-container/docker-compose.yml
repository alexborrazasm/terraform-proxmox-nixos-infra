services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    user: "1000:131"
    ports:
      - "3000:3000"
    volumes:
      - ./data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=z_123.
    networks: 
      - monitoring-network

networks:
  monitoring-network:
    name: monitoring-network
    driver: bridge
